# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy with: connect this repo in the Render dashboard and select "Blueprint"

services:
  # ── Discord Bot ───────────────────────────────────────────────────────────────
  - type: worker
    name: pm-discord-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    envVars:
      - key: DOTNET_ENVIRONMENT
        value: Production
      - key: Discord__BotToken
        sync: false
      - key: Discord__GuildId
        sync: false
      - key: Ai__ApiKey
        sync: false
      - key: Ai__Model
        value: gpt-4o-mini
      - key: Ai__ApiBaseUrl
        sync: false
