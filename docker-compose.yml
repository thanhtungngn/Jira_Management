# Local development — run the Discord bot in Docker.
# Copy appsettings.example.json → src/ProjectManagement.Discord/appsettings.json and fill in credentials,
# then run:  docker compose up --build

services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: pm-discord-bot:local
    container_name: pm-discord-bot
    environment:
      DOTNET_ENVIRONMENT: Production

      # ── Discord ────────────────────────────────────────────────────────────────
      Discord__BotToken:  ${DISCORD_BOT_TOKEN}
      Discord__GuildId:   ${DISCORD_GUILD_ID:-}

      # ── OpenAI LLM ────────────────────────────────────────────────────────────
      Ai__ApiKey:     ${AI_API_KEY}
      Ai__Model:      ${AI_MODEL:-gpt-4o-mini}
      Ai__ApiBaseUrl: ${AI_API_BASE_URL}

    restart: unless-stopped
